name: Claustor AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  REGISTRY: asia-south1-docker.pkg.dev
  REPOSITORY: claustor

jobs:

  # ─────────────────────────────────────────────────────────
  # Detect changes — only build/deploy what changed
  # ─────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'infrastructure/docker/api.Dockerfile'
            web:
              - 'apps/web/**'
            worker:
              - 'apps/worker/**'
              - 'infrastructure/docker/worker.Dockerfile'

  # ─────────────────────────────────────────────────────────
  # Test API
  # ─────────────────────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: claustor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/claustor_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: test-secret-key-minimum-32-characters-long
          PINECONE_API_KEY: test-key
          GROQ_API_KEY: test-key
        run: |
          cd apps/api
          pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=70
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml

  # ─────────────────────────────────────────────────────────
  # Test Web
  # ─────────────────────────────────────────────────────────
  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter web lint
      - name: Build
        run: pnpm --filter web build
        env:
          AUTH0_SECRET: test-secret
          AUTH0_BASE_URL: http://localhost:3000
          AUTH0_ISSUER_BASE_URL: https://test.auth0.com
          AUTH0_CLIENT_ID: test-client-id
          AUTH0_CLIENT_SECRET: test-client-secret

  # ─────────────────────────────────────────────────────────
  # Deploy API to Cloud Run
  # ─────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [test-api]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - name: Build and push API image
        run: |
          docker build \
            -f infrastructure/docker/api.Dockerfile \
            -t $REGISTRY/$GCP_PROJECT/$REPOSITORY/api:${{ github.sha }} \
            -t $REGISTRY/$GCP_PROJECT/$REPOSITORY/api:latest \
            .
          docker push $REGISTRY/$GCP_PROJECT/$REPOSITORY/api:${{ github.sha }}
          docker push $REGISTRY/$GCP_PROJECT/$REPOSITORY/api:latest
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy claustor-api \
            --image $REGISTRY/$GCP_PROJECT/$REPOSITORY/api:${{ github.sha }} \
            --region $GCP_REGION \
            --platform managed \
            --min-instances 0 \
            --max-instances 10 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 600 \
            --set-secrets="GROQ_API_KEY=GROQ_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,PINECONE_API_KEY=PINECONE_API_KEY:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest" \
            --set-env-vars="ENVIRONMENT=production,GCP_PROJECT=$GCP_PROJECT"

  # ─────────────────────────────────────────────────────────
  # Deploy Web to Vercel
  # ─────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [test-web]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Deploy to Vercel
        run: |
          pnpm install -g vercel
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            apps/web
